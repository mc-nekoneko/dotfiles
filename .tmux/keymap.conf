# Nested tmux support (F12 toggle)
# F12: ローカル tmux の操作を無効化 → リモート tmux に全キーが届く
# もう一度 F12 で元に戻る
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=colour245,bg=colour238" \;\
  set window-status-current-format "#[fg=colour245 bg=colour238] #I / #[fg=colour250]#W#F " \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u window-status-current-format \;\
  refresh-client -S
